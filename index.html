<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Launch</title>
    <style>
        /* --- 1. PALETTE --- */
        :root {
            --bg-color: #21242c;
            --bg-gradient: #353942;
            --earth-base: #1c1f26;
            --earth-detail: #2a2e36;
            --earth-atmosphere: rgba(255, 255, 255, 0.05);
            --earth-highlight: rgba(255,255,255,0.06);
            --rocket-body: #e6e6e6;
            --rocket-shadow: #999999;
            --rocket-dark: #151515;
            --star-color: white;
            --star-opacity: 0.1;
            --star-peak-opacity: 0.8;
            --nebula-opacity: 0.08;
            --shooting-star-color: rgba(255,255,255,0.8);
            --atmosphere-glow: rgba(255, 255, 255, 0.15);
            --atmosphere-glow-md: rgba(255, 255, 255, 0.08);
            --atmosphere-glow-sm: rgba(255, 255, 255, 0.2);
            --window-bg: #111;
            --window-border: #666;
            --fin-center-color: var(--rocket-dark);
            --flame-core-top: #ffffff;
            --flame-core-mid: rgba(200, 200, 200, 0.8);
            --flame-core-end: rgba(150, 150, 150, 0.4);
            --flame-outer-top: rgba(200, 200, 200, 0.7);
            --flame-outer-mid: rgba(100, 100, 100, 0.3);
            --flame-outer-end: rgba(50, 50, 50, 0.1);
            --exhaust-glow: rgba(200, 200, 200, 0.1);
            --sprinkle-color: white;
            --smoke-opacity: 0.3;

            /* HUD Panel */
            --hud-border: rgba(255, 255, 255, 0.15);
            --hud-glow: rgba(255, 255, 255, 0.05);
            --hud-bg: rgba(28, 31, 38, 0.7);
            --hud-text: rgba(230, 230, 230, 0.9);
            --hud-text-dim: rgba(200, 200, 200, 0.5);
            --hud-label: rgba(180, 180, 180, 0.4);
            --hud-scanline: rgba(255, 255, 255, 0.02);
            --hud-cursor: rgba(230, 230, 230, 0.8);
        }

        [data-theme="light"] {
            --bg-color: #e8ebf0;
            --bg-gradient: #d0d4dc;
            --earth-base: #e0e3e8;
            --earth-detail: #d0d3da;
            --earth-atmosphere: rgba(0, 0, 0, 0.05);
            --earth-highlight: rgba(255,255,255,0.1);
            --rocket-body: #e6e6e6;
            --rocket-shadow: #999999;
            --rocket-dark: #151515;
            --star-color: #555;
            --star-opacity: 0.08;
            --star-peak-opacity: 0.4;
            --nebula-opacity: 0.05;
            --shooting-star-color: rgba(80,80,80,0.6);
            --atmosphere-glow: rgba(0, 0, 0, 0.3);
            --atmosphere-glow-md: rgba(0, 0, 0, 0.15);
            --atmosphere-glow-sm: rgba(0, 0, 0, 0.35);
            --window-bg: #111;
            --window-border: #666;
            --fin-center-color: #151515;
            --flame-core-top: #333333;
            --flame-core-mid: rgba(40, 40, 40, 0.7);
            --flame-core-end: rgba(20, 20, 20, 0.4);
            --flame-outer-top: rgba(50, 50, 50, 0.6);
            --flame-outer-mid: rgba(20, 20, 20, 0.3);
            --flame-outer-end: rgba(0, 0, 0, 0.1);
            --exhaust-glow: rgba(50, 50, 50, 0.1);
            --sprinkle-color: #000000;
            --smoke-opacity: 0.2;

            /* HUD Panel */
            --hud-border: rgba(60, 60, 70, 0.5);
            --hud-glow: rgba(60, 60, 70, 0.15);
            --hud-bg: rgba(220, 225, 235, 0.6);
            --hud-text: rgba(30, 35, 45, 0.9);
            --hud-text-dim: rgba(30, 35, 45, 0.5);
            --hud-label: rgba(30, 35, 45, 0.35);
            --hud-scanline: rgba(30, 35, 45, 0.03);
            --hud-cursor: rgba(30, 35, 45, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 80%, var(--bg-gradient) 0%, var(--bg-color) 70%);
            transition: background-color 0.8s ease, background-image 0.8s ease;
            font-family: sans-serif;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            overflow: hidden;
        }

        /* --- 2. NEBULA BACKDROP --- */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: var(--nebula-opacity);
            transition: opacity 0.8s ease;
            z-index: 0;
            pointer-events: none;
        }
        .nebula-1 {
            width: 500px; height: 400px;
            background: radial-gradient(circle, #7b2d8e, transparent);
            top: 10%; left: 5%;
            animation: nebulaDrift 20s ease-in-out infinite alternate;
        }
        .nebula-2 {
            width: 400px; height: 350px;
            background: radial-gradient(circle, #1a6b6a, transparent);
            top: 20%; right: 10%;
            animation: nebulaDrift 25s ease-in-out infinite alternate-reverse;
        }
        .nebula-3 {
            width: 350px; height: 300px;
            background: radial-gradient(circle, #4a3f8a, transparent);
            bottom: 30%; left: 60%;
            animation: nebulaDrift 18s ease-in-out infinite alternate;
        }
        @keyframes nebulaDrift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.1); }
        }

        /* --- 3. STARS (3 parallax layers) --- */
        .star-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            transition: transform 0.3s ease-out;
        }
        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            opacity: var(--star-opacity);
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: var(--star-opacity); transform: scale(1); }
            50% { opacity: var(--star-peak-opacity); transform: scale(1.3); }
        }

        /* --- 4. SHOOTING STARS --- */
        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--star-color);
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 60px;
            height: 1.5px;
            background: linear-gradient(to left, var(--shooting-star-color), transparent);
            transform-origin: right center;
            transform: rotate(0deg) translateX(-60px);
        }
        @keyframes shoot {
            0% { opacity: 0; transform: translate(0, 0) rotate(-35deg); }
            5% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translate(-400px, 250px) rotate(-35deg); }
        }

        /* --- 5. EARTH + ATMOSPHERE GLOW --- */
        .earth-wrapper {
            position: absolute;
            top: 85%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        .earth-atmosphere-glow {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 252vw;
            height: 252vw;
            border-radius: 50%;
            background: transparent;
            box-shadow:
                0 -4px 20px var(--atmosphere-glow),
                0 -8px 40px var(--atmosphere-glow-md),
                0 -2px 8px var(--atmosphere-glow-sm);
            pointer-events: none;
            z-index: 2;
        }
        .earth {
            position: relative;
            width: 250vw;
            height: 250vw;
            border-radius: 50%;
            background:
                radial-gradient(circle at 50% 0%, var(--earth-highlight) 0%, transparent 40%),
                radial-gradient(circle at 30% 30%, var(--earth-detail) 0%, transparent 20%),
                radial-gradient(circle at 70% 40%, var(--earth-detail) 0%, transparent 25%),
                var(--earth-base);
            box-shadow: 0 -10px 100px var(--earth-atmosphere);
            transition: background 0.8s ease, box-shadow 0.8s ease;
            z-index: 1;
        }

        /* --- 6. ROCKET CONTAINER --- */
        .rocket-container {
            position: absolute;
            top: 25%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out;
        }

        /* Float + engine vibration combined */
        .rocket-container.idle {
            animation: floatAndVibrate 4s ease-in-out infinite;
        }
        @keyframes floatAndVibrate {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-10px) translateX(0.5px); }
            25.5% { transform: translateY(-10px) translateX(-0.5px); }
            50% { transform: translateY(-20px) translateX(0.5px); }
            50.5% { transform: translateY(-20px) translateX(-0.5px); }
            75% { transform: translateY(-10px) translateX(0.5px); }
            75.5% { transform: translateY(-10px) translateX(-0.5px); }
        }

        /* Launch animation */
        .rocket-container.launching {
            animation: launch 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes launch {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(10px) scale(1); }
            100% { transform: translateY(-120vh) scale(0.6); }
        }
        .rocket-container.returning {
            animation: returnFromBelow 2.5s cubic-bezier(0.0, 0.0, 0.2, 1) forwards;
        }
        @keyframes returnFromBelow {
            0% { transform: translateY(120vh) scale(0.4); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Camera shake */
        .scene.shake {
            animation: cameraShake 0.6s ease-out;
        }
        @keyframes cameraShake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-3px, 2px); }
            20% { transform: translate(3px, -2px); }
            30% { transform: translate(-2px, 3px); }
            40% { transform: translate(2px, -1px); }
            50% { transform: translate(-1px, 2px); }
            60% { transform: translate(1px, -1px); }
            80% { transform: translate(0, 1px); }
            100% { transform: translate(0, 0); }
        }

        /* --- 7. ROCKET PARTS --- */
        .rocket-body {
            position: relative;
            width: 70px;
            height: 180px;
            background: linear-gradient(to right, var(--rocket-body) 40%, var(--rocket-shadow));
            border-radius: 50% 50% 10% 10%;
            z-index: 5;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: background 0.8s ease;
        }

        .window {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 35px;
            background: var(--window-bg);
            border: 3px solid var(--window-border);
            border-radius: 50%;
        }

        .fin {
            position: absolute;
            bottom: 20px;
            width: 30px;
            height: 50px;
            background: var(--rocket-dark);
            z-index: 4;
        }
        .fin.left { left: -25px; border-radius: 80% 0 0 100%; transform: rotate(-10deg); }
        .fin.right { right: -25px; border-radius: 0 80% 100% 0; transform: rotate(10deg); }
        .fin-center {
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 4px; height: 50px; background: var(--fin-center-color);
            z-index: 6;
        }

        /* --- 8. EXHAUST (Colorized) --- */
        .exhaust-visuals {
            position: absolute;
            top: 155px;
            width: 60px;
            z-index: 1;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .flame-core {
            position: absolute; top: 0;
            width: 24px;
            height: 400px;
            background: linear-gradient(to bottom,
                var(--flame-core-top) 0%,
                var(--flame-core-mid) 15%,
                var(--flame-core-end) 45%,
                transparent 100%
            );
            border-radius: 0 0 50% 50%;
            filter: blur(4px);
            animation: burn 0.1s infinite alternate;
            transition: height 0.4s ease-out;
        }
        .flame-outer {
            position: absolute; top: 0;
            width: 52px;
            height: 480px;
            background: linear-gradient(to bottom,
                var(--flame-outer-top) 0%,
                var(--flame-outer-mid) 35%,
                var(--flame-outer-end) 65%,
                transparent 100%
            );
            border-radius: 0 0 50% 50%;
            filter: blur(10px);
            opacity: 0.6;
            animation: burn 0.15s infinite alternate-reverse;
            transition: height 0.4s ease-out;
        }

        /* Exhaust ambient glow */
        .exhaust-glow {
            position: absolute;
            top: 155px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--exhaust-glow), transparent 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(20px);
            transition: opacity 0.4s;
        }

        @keyframes burn {
            0% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0.95); opacity: 0.9; }
        }

        /* Launch-intensified exhaust */
        .rocket-container.launching .flame-core {
            height: 600px !important;
            width: 24px;
            filter: blur(6px);
        }
        .rocket-container.launching .flame-outer {
            height: 750px !important;
            width: 55px;
            opacity: 0.9;
        }

        /* --- 9. EXHAUST TRIGGER --- */
        .exhaust-trigger {
            position: absolute;
            top: 150px;
            width: 80px;
            height: 300px;
            z-index: 20;
            background: transparent;
            cursor: pointer;
        }
        .exhaust-trigger:hover ~ .exhaust-visuals .flame-core { height: 500px; }
        .exhaust-trigger:hover ~ .exhaust-visuals .flame-outer { height: 600px; }

        /* --- 10. SPRINKLES --- */
        .sprinkle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--sprinkle-color);
            box-shadow: 0 0 6px var(--sprinkle-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }
        @keyframes fall {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* --- 11. SMOKE PARTICLES --- */
        .smoke {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
        }
        @keyframes smokeDrift {
            0% { opacity: 0.15; transform: translate(0, 0) scale(0.5); }
            100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(2); }
        }

        /* --- 12. HUD TERMINAL PANEL --- */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        .hud-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 50;
            width: 320px;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            pointer-events: none;
        }

        .hud-frame {
            position: relative;
            border: 1px solid var(--hud-border);
            background: var(--hud-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 20px 18px 16px;
            box-shadow:
                0 0 15px var(--hud-glow),
                inset 0 0 15px var(--hud-glow);
            transition: border-color 0.8s ease, background 0.8s ease, box-shadow 0.8s ease;
        }

        /* Corner brackets */
        .hud-frame::before,
        .hud-frame::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: var(--hud-text);
            transition: border-color 0.8s ease;
        }
        .hud-frame::before {
            top: -1px;
            left: -1px;
            border-top: 2px solid;
            border-left: 2px solid;
        }
        .hud-frame::after {
            top: -1px;
            right: -1px;
            border-top: 2px solid;
            border-right: 2px solid;
        }
        .hud-corner-bl,
        .hud-corner-br {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: var(--hud-text);
            transition: border-color 0.8s ease;
        }
        .hud-corner-bl {
            bottom: -1px;
            left: -1px;
            border-bottom: 2px solid;
            border-left: 2px solid;
        }
        .hud-corner-br {
            bottom: -1px;
            right: -1px;
            border-bottom: 2px solid;
            border-right: 2px solid;
        }

        /* Scanline overlay */
        .hud-scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--hud-scanline) 2px,
                var(--hud-scanline) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        /* Header */
        .hud-header {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--hud-label);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--hud-border);
            transition: color 0.8s ease, border-color 0.8s ease;
        }
        .hud-header span {
            color: var(--hud-text);
            transition: color 0.8s ease;
        }

        /* Content rows */
        .hud-row {
            margin-bottom: 6px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--hud-text);
            opacity: 0;
            transition: color 0.8s ease;
        }
        .hud-row.visible {
            opacity: 1;
        }
        .hud-label {
            color: var(--hud-text-dim);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.8s ease;
        }
        .hud-value {
            display: inline;
        }

        /* Typewriter cursor */
        .hud-cursor {
            display: inline-block;
            width: 7px;
            height: 14px;
            background: var(--hud-cursor);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 0.8s step-end infinite;
            transition: background 0.8s ease;
        }
        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Pulse glow on the border */
        .hud-frame {
            animation: hudPulse 4s ease-in-out infinite;
        }
        @keyframes hudPulse {
            0%, 100% { box-shadow: 0 0 15px var(--hud-glow), inset 0 0 15px var(--hud-glow); }
            50% { box-shadow: 0 0 25px var(--hud-glow), inset 0 0 20px var(--hud-glow); }
        }

        /* --- 13. CLICK HINT --- */
        .click-hint {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 160px;
            z-index: 25;
            cursor: pointer;
            border-radius: 50% 50% 10% 10%;
        }
    </style>
</head>
<body>

<div class="scene" id="scene">
    <!-- HUD About Panel -->
    <div class="hud-panel" id="hudPanel">
        <div class="hud-frame">
            <div class="hud-scanlines"></div>
            <div class="hud-corner-bl"></div>
            <div class="hud-corner-br"></div>
            <div class="hud-header">&gt; <span>PILOT_INFO</span></div>
            <div class="hud-row" id="hud-row-0">
                <div class="hud-label">Name</div>
                <div class="hud-value" data-text="Nemanja Vasic"></div>
            </div>
            <div class="hud-row" id="hud-row-1">
                <div class="hud-label">Role</div>
                <div class="hud-value" data-text="Full-Stack Developer"></div>
            </div>
            <div class="hud-row" id="hud-row-2">
                <div class="hud-label">Mission</div>
                <div class="hud-value" data-text="Building elegant digital experiences from orbit."></div>
            </div>
            <div class="hud-row" id="hud-row-3">
                <div class="hud-label">Status</div>
                <div class="hud-value" data-text="Online // Ready for launch"></div>
            </div>
            <span class="hud-cursor" id="hudCursor"></span>
        </div>
    </div>

    <!-- Nebula clouds -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <!-- Star layers (parallax) -->
    <div class="star-layer" id="star-layer-1" data-depth="0.02"></div>
    <div class="star-layer" id="star-layer-2" data-depth="0.05"></div>
    <div class="star-layer" id="star-layer-3" data-depth="0.08"></div>

    <!-- Shooting stars container -->
    <div id="shooting-star-container"></div>

    <!-- Earth -->
    <div class="earth-wrapper">
        <div class="earth-atmosphere-glow"></div>
        <div class="earth"></div>
    </div>

    <!-- Rocket -->
    <div class="rocket-container idle" id="rocket">
        <div class="fin left"></div>
        <div class="fin right"></div>
        <div class="rocket-body">
            <div class="window"></div>
            <div class="fin-center"></div>
        </div>

        <div class="exhaust-glow"></div>
        <div class="exhaust-visuals">
            <div class="flame-outer"></div>
            <div class="flame-core"></div>
        </div>

        <div class="exhaust-trigger" id="trigger"></div>
        <div class="click-hint" id="clickHint"></div>
    </div>
</div>

<script>
    const scene = document.getElementById('scene');
    const rocket = document.getElementById('rocket');
    const trigger = document.getElementById('trigger');
    const clickHint = document.getElementById('clickHint');
    const starLayers = document.querySelectorAll('.star-layer');
    let isLaunching = false;

    /* ========== 1. STARS (3 parallax layers) ========== */
    const starCounts = [50, 60, 40];
    starLayers.forEach((layer, idx) => {
        for (let i = 0; i < starCounts[idx]; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 85 + '%';
            const size = Math.random() * (1.5 + idx * 0.5) + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            layer.appendChild(star);
        }
    });

    /* ========== 2. PARALLAX (stars + rocket tilt) ========== */
    let mouseX = 0.5, mouseY = 0.5;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX / window.innerWidth;
        mouseY = e.clientY / window.innerHeight;

        // Star parallax
        starLayers.forEach(layer => {
            const depth = parseFloat(layer.dataset.depth);
            const moveX = (mouseX - 0.5) * depth * 100;
            const moveY = (mouseY - 0.5) * depth * 60;
            layer.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Rocket tilt toward cursor
        if (!isLaunching) {
            const tiltX = (mouseX - 0.5) * 8;
            const tiltY = (mouseY - 0.5) * 4;
            rocket.style.setProperty('--tiltX', tiltX + 'deg');
            rocket.style.setProperty('--tiltY', tiltY + 'deg');
        }
    });

    // Apply tilt via animation frame
    function applyTilt() {
        if (!isLaunching && rocket.classList.contains('idle')) {
            const currentTransform = getComputedStyle(rocket).transform;
            // We layer tilt using a wrapper approach via CSS custom properties
        }
        requestAnimationFrame(applyTilt);
    }

    /* ========== 3. SHOOTING STARS ========== */
    const shootingContainer = document.getElementById('shooting-star-container');

    function createShootingStar() {
        const star = document.createElement('div');
        star.classList.add('shooting-star');
        star.style.left = (Math.random() * 60 + 20) + '%';
        star.style.top = (Math.random() * 40) + '%';

        const duration = Math.random() * 1.5 + 0.8;
        star.style.animation = `shoot ${duration}s linear forwards`;

        shootingContainer.appendChild(star);
        setTimeout(() => star.remove(), duration * 1000 + 100);
    }

    // Random shooting stars
    function scheduleShootingStar() {
        const delay = Math.random() * 4000 + 2000;
        setTimeout(() => {
            createShootingStar();
            scheduleShootingStar();
        }, delay);
    }
    scheduleShootingStar();

    /* ========== 4. SPRINKLES ========== */
    let isHovering = false;

    trigger.addEventListener('mouseenter', () => isHovering = true);
    trigger.addEventListener('mouseleave', () => isHovering = false);

    trigger.addEventListener('mousemove', (e) => {
        if (!isHovering) return;
        for (let i = 0; i < 5; i++) createSprinkle(e.clientX, e.clientY);
    });

    function createSprinkle(x, y) {
        const s = document.createElement('div');
        s.classList.add('sprinkle');

        const ox = (Math.random() - 0.5) * 30;
        const oy = (Math.random() - 0.5) * 30;
        s.style.left = (x + ox) + 'px';
        s.style.top = (y + oy) + 'px';


        const tx = (Math.random() - 0.5) * 150 + 'px';
        const ty = (Math.random() * 300 + 100) + 'px';
        s.style.setProperty('--tx', tx);
        s.style.setProperty('--ty', ty);

        const dur = Math.random() * 0.7 + 0.5;
        s.style.animation = `fall ${dur}s linear forwards`;

        document.body.appendChild(s);
        setTimeout(() => s.remove(), dur * 1000 + 100);
    }

    /* ========== 5. SMOKE TRAIL ========== */
    let smokeInterval;

    function startSmoke() {
        smokeInterval = setInterval(() => {
            if (isLaunching) return;
            createSmoke();
        }, 120);
    }

    function createSmoke() {
        const smoke = document.createElement('div');
        smoke.classList.add('smoke');

        const rocketRect = rocket.getBoundingClientRect();
        const cx = rocketRect.left + rocketRect.width / 2;
        const cy = rocketRect.top + 180;

        smoke.style.left = (cx + (Math.random() - 0.5) * 20) + 'px';
        smoke.style.top = cy + 'px';

        const size = Math.random() * 15 + 8;
        smoke.style.width = size + 'px';
        smoke.style.height = size + 'px';
        smoke.style.background = `rgba(${150 + Math.random()*50}, ${150 + Math.random()*50}, ${160 + Math.random()*50}, 0.3)`;

        const sx = (Math.random() - 0.5) * 80 + 'px';
        const sy = (Math.random() * 120 + 60) + 'px';
        smoke.style.setProperty('--sx', sx);
        smoke.style.setProperty('--sy', sy);

        const dur = Math.random() * 1.5 + 1;
        smoke.style.animation = `smokeDrift ${dur}s ease-out forwards`;

        document.body.appendChild(smoke);
        setTimeout(() => smoke.remove(), dur * 1000 + 100);
    }

    startSmoke();

    /* ========== 6. CLICK TO LAUNCH + THEME SWITCH ========== */
    let isDark = true;

    clickHint.addEventListener('click', () => {
        if (isLaunching) return;
        isLaunching = true;

        // Camera shake
        scene.classList.add('shake');
        setTimeout(() => scene.classList.remove('shake'), 600);

        // Burst of sprinkles
        const rocketRect = rocket.getBoundingClientRect();
        const cx = rocketRect.left + rocketRect.width / 2;
        const cy = rocketRect.top + 180;
        for (let i = 0; i < 40; i++) {
            setTimeout(() => createSprinkle(cx, cy), i * 20);
        }

        // Launch
        rocket.classList.remove('idle');
        rocket.classList.add('launching');

        // Switch theme while rocket is off-screen
        setTimeout(() => {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        }, 1800);

        // After rocket leaves screen, bring it back
        setTimeout(() => {
            rocket.classList.remove('launching');
            rocket.classList.add('returning');

            // Burst on re-entry
            setTimeout(() => {
                const rect2 = rocket.getBoundingClientRect();
                const cx2 = rect2.left + rect2.width / 2;
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => createSprinkle(cx2, window.innerHeight - 100), i * 30);
                }
            }, 500);

            setTimeout(() => {
                rocket.classList.remove('returning');
                rocket.classList.add('idle');
                isLaunching = false;
            }, 2500);
        }, 2200);
    });

    /* ========== 7. HUD TYPEWRITER ========== */
    (function initHUD() {
        const rows = document.querySelectorAll('.hud-row');
        const cursor = document.getElementById('hudCursor');
        let currentRow = 0;

        function typeRow(row, callback) {
            const valueEl = row.querySelector('.hud-value');
            const fullText = valueEl.getAttribute('data-text');
            let charIndex = 0;

            row.classList.add('visible');
            // Move cursor next to this row's value
            valueEl.appendChild(cursor);

            function typeChar() {
                if (charIndex < fullText.length) {
                    valueEl.textContent = fullText.substring(0, charIndex + 1);
                    valueEl.appendChild(cursor);
                    charIndex++;
                    setTimeout(typeChar, 35 + Math.random() * 25);
                } else {
                    setTimeout(callback, 300);
                }
            }
            typeChar();
        }

        function typeNextRow() {
            if (currentRow < rows.length) {
                typeRow(rows[currentRow], () => {
                    currentRow++;
                    typeNextRow();
                });
            } else {
                // Typing done — park cursor at the end
                const lastValue = rows[rows.length - 1].querySelector('.hud-value');
                lastValue.appendChild(cursor);
            }
        }

        // Start after a short delay
        setTimeout(typeNextRow, 800);
    })();
</script>
